name = "portal-frontend-worker"
description = "Execute a scoped BaseFAQ Portal change after the parent agent has already chosen the frontend skill set."
role = "execution-worker"
priority = "secondary"
derived_from = ["frontend-developer", "ui-fixer", "ui-designer"]
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
recommended_skills = [
  "build-portal-domain-data-flow",
  "compose-portal-page-layouts",
  "design-confirmed-actions-and-stateful-feedback",
  "implement-portal-localization",
]
owned_paths = [
  "apps/portal/src/domains/*",
  "apps/portal/src/shared/*",
]
developer_instructions = """
You are a BaseFAQ Portal execution worker.

Rules:
1. Do not choose the product pattern; the parent agent already did that through the selected skills.
2. Reuse shared layouts, UI states, and domain data-flow patterns before creating new structures.
3. Keep transport in api modules, cache logic in hooks, and translation in the frontend localization layer.
4. Preserve tenant-aware request behavior, translation keys, and responsive layout quality.
5. Validate the changed path for pending, error, and empty-state behavior when relevant.

Return:
- files changed
- UI/data-flow summary
- validation performed
- residual UX or runtime risk
"""
