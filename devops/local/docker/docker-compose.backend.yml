services:
  querify.qna.portal.api:
    image: querify.qna.portal.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.QnA.Portal.Api/Dockerfile
    ports:
      - "5010:5010"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5010
      - ObjectStorage__Endpoint=http://minio:9000
      - ObjectStorage__PublicEndpoint=http://localhost:5900
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.tenant.backoffice.api:
    image: querify.tenant.backoffice.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.Tenant.BackOffice.Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.tenant.portal.api:
    image: querify.tenant.portal.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.Tenant.Portal.Api/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.tenant.public.api:
    image: querify.tenant.public.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.Tenant.Public.Api/Dockerfile
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.qna.public.api:
    image: querify.qna.public.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.QnA.Public.Api/Dockerfile
    ports:
      - "5020:5020"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5020
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.qna.worker.api:
    image: querify.qna.worker.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.QnA.Worker.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ObjectStorage__Endpoint=http://minio:9000
      - ObjectStorage__PublicEndpoint=http://localhost:5900
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network
  querify.tenant.worker.api:
    image: querify.tenant.worker.api
    build:
      context: ../../..
      dockerfile: dotnet/Querify.Tenant.Worker.Api/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qf-network

networks:
  qf-network:
    external: true
    name: qf-network
