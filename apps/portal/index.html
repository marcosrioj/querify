<!doctype html>
<html class="h-full" lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/media/app/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Querify Portal - multi-tenant customer-facing SaaS workspace."
    />
    <meta
      name="keywords"
      content="querify,portal,qna,saas,multi-tenant,react,typescript"
    />
    <meta name="author" content="Querify" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap"
    />
    <style>
      .dark body {
        background-color: hsl(240 10% 4%);
      }
    </style>
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('querify-portal-theme') || 'system';
          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          const isDarkMode =
            theme === 'dark' || (theme === 'system' && prefersDark);
          if (isDarkMode) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground flex h-full min-w-0 text-base antialiased">
    <div class="flex min-w-0 grow" id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
