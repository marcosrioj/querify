services:
  basefaq.qna.portal.api:
    image: basefaq.qna.portal.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.QnA.Portal.Api/Dockerfile
    ports:
      - "5010:5010"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network
  basefaq.tenant.backoffice.api:
    image: basefaq.tenant.backoffice.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.Tenant.BackOffice.Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network
  basefaq.tenant.portal.api:
    image: basefaq.tenant.portal.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.Tenant.Portal.Api/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network
  basefaq.tenant.public.api:
    image: basefaq.tenant.public.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.Tenant.Public.Api/Dockerfile
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network
  basefaq.qna.public.api:
    image: basefaq.qna.public.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.QnA.Public.Api/Dockerfile
    ports:
      - "5020:5020"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5020
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network
  basefaq.tenant.worker.api:
    image: basefaq.tenant.worker.api
    build:
      context: ..
      dockerfile: dotnet/BaseFaq.Tenant.Worker.Api/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bf-network

networks:
  bf-network:
    external: true
    name: bf-network
